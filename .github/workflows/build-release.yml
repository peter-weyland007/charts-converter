name: Build release artifacts

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[build]'

      - name: Run tests
        run: python -m pytest tests/test_cli.py

      - name: Build GUI + CLI artifacts
        run: python scripts/build_release.py

      - name: Archive build output
        shell: bash
        run: |
          python - <<'PY'
          import pathlib, shutil
          root = pathlib.Path('release/dist')
          dirs = [p for p in root.iterdir() if p.is_dir()]
          assert dirs, 'no build output dirs found'
          out = dirs[0]
          archive = shutil.make_archive(str(out), 'zip', root_dir=out)
          print(archive)
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: psarc-converter-${{ runner.os }}-${{ runner.arch }}
          path: release/dist/*.zip

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/dist/*.zip
